<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 - 필수단어</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">
      <div class="apt-tag">GRAN HILLS GROUP STUDY</div>
      <button class="back-btn" onclick="location.href = 'index.html'">
        ◀ 로비로
      </button>

      <div id="start-screen" class="question-box">
        <div
          class="apt-tag"
          style="
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
          "
        >
          STEP 1
        </div>
        <h2 style="font-size: 2.2rem; margin-top: 10px">단어 스피드 게임</h2>

        <p class="intro-text">
          20초 안에 정답을 맞히세요!<br />
          <span style="color: var(--primary); font-weight: bold"
            >한자를 클릭하면 병음 힌트</span
          >가 나옵니다.
        </p>

        <p class="voice-instruction">
          "한자를 보고 읽을 수 있도록<br />
          <span style="color: var(--primary); font-weight: bold"
            >소리를 내어</span
          >
          크게 읽어주세요!"
        </p>

        <button id="start-btn" onclick="startGame()" style="margin-top: 20px">
          ⚡ 게임 시작
        </button>
      </div>

      <div id="game-board" style="display: none">
        <div class="header">
          <div class="status-badge">🕒 시간 <span id="timer">20</span>s</div>
          <div class="status-badge">✅ 정답 <span id="score">0</span> / 20</div>
        </div>
        <div class="question-box">
          <div
            id="ko-question"
            onclick="showHint()"
            style="font-size: 3rem; cursor: pointer"
          >
            我
          </div>
          <div id="q-pinyin" class="pinyin-text" style="visibility: hidden">
            wǒ
          </div>
          <p style="font-size: 0.7rem; color: #ccc; margin-top: 10px">
            (모를 때는 한자를 클릭하세요!)
          </p>
        </div>
        <div
          id="feedback-msg"
          style="
            text-align: center;
            height: 24px;
            margin-bottom: 10px;
            font-weight: bold;
          "
        ></div>
        <div class="choices-area">
          <button class="choice-btn" id="btn-0" onclick="selectAnswer(0)">
            <span class="cn-text" id="ko-text-0"></span>
          </button>
          <button class="choice-btn" id="btn-1" onclick="selectAnswer(1)">
            <span class="cn-text" id="ko-text-1"></span>
          </button>
          <button class="choice-btn" id="btn-2" onclick="selectAnswer(2)">
            <span class="cn-text" id="ko-text-2"></span>
          </button>
          <button class="choice-btn" id="btn-3" onclick="selectAnswer(3)">
            <span class="cn-text" id="ko-text-3"></span>
          </button>
        </div>
      </div>

      <div id="result-screen">
        <div class="result-content">
          <div class="apt-tag">SPEED MASTER</div>
          <h2>🎉 축하합니다!</h2>
          <p id="final-score"></p>
          <button class="home-btn" onclick="location.href = 'index.html'">
            🏠 로비로 돌아가기
          </button>
        </div>
      </div>
    </div>
    <script src="day1_word_script.js"></script>
    <audio id="timer-sound" src="timer_tick.mp3" loop preload="auto"></audio>
    <audio id="correct-sound" src="correct.mp3" preload="auto"></audio>
    <audio id="wrong-sound" src="wrong.mp3" preload="auto"></audio>

    <style>
      /* 클릭 금지 상태일 때 버튼 효과 제거 */
      .choices-area.disabled {
        pointer-events: none; /* 클릭 차단 */
      }
      .choices-area.disabled .choice-btn:hover {
        transform: none !important; /* 커지는 효과 제거 */
        box-shadow: none !important;
      }
    </style>

    <audio id="timer-sound" src="timer_tick.mp3" loop preload="auto"></audio>
    <audio id="correct-sound" src="correct.mp3" preload="auto"></audio>
    <audio id="wrong-sound" src="wrong.mp3" preload="auto"></audio>
  </body>
</html>
