<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 스피킹게임</title>
    <meta property="og:title" content="진담중국어 - 스피킹게임" />
    <meta
      property="og:description"
      content="입주민을 위한 프리미엄 중국어 복습 게임"
    />
    <meta property="og:image" content="image.png" />
    <meta
      property="og:url"
      content="https://jindam1799.github.io/granhills_jindam/"
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="진담중국어 - 스피킹게임" />
    <meta
      name="twitter:description"
      content="입주민을 위한 프리미엄 중국어 복습 게임"
    />
    <meta name="twitter:image" content="image.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="intro-overlay" onclick="startLobby()">
      <video id="intro-video" autoplay muted playsinline loop>
        <source src="intro.mp4" type="video/mp4" />
        영상을 재생할 수 없습니다.
      </video>
    </div>

    <div class="lobby-container" id="main-lobby" style="display: none">
      <div class="apt-tag">GRAN HILLS GROUP STUDY</div>

      <header class="lobby-header">
        <h1>진담중국어 <span>스피킹게임</span></h1>
        <p>입주민을 위한 프리미엄 복습 공간</p>
      </header>

      <div class="week-section">
        <div class="week-title">
          <span class="week-num">Week 1</span>
          <span class="week-desc">틀잡기</span>
        </div>
        <div class="step-row">
          <a href="day1_word.html" class="step-card">
            <span class="step-label">STEP 1</span>
            <span class="step-name">주요 단어</span>
          </a>
          <a href="day1_choice.html" class="step-card">
            <span class="step-label">STEP 2</span>
            <span class="step-name">덩어리게임</span>
          </a>
        </div>
      </div>

      <div class="week-section">
        <div class="week-title">
          <span class="week-num">Week 2</span>
          <span class="week-desc">인물과 문화</span>
        </div>
        <div class="step-row">
          <a href="day2_word.html" class="step-card">
            <span class="step-label">STEP 1</span>
            <span class="step-name">주요 단어</span>
          </a>
          <a href="day2_choice.html" class="step-card">
            <span class="step-label">STEP 2</span>
            <span class="step-name">덩어리게임</span>
          </a>
        </div>
      </div>

      <footer class="lobby-footer">
        <p class="footer-brand">진담중국어 X 부평 그랑힐스</p>
        <p class="footer-info">입주민을 위한 맞춤 교육 시스템</p>
        <p class="copyright">
          &copy; 2026 JINDAM CHINESE. All rights reserved.
        </p>
      </footer>
    </div>

    <script>
      function startLobby() {
        const introOverlay = document.getElementById('intro-overlay');
        const introVideo = document.getElementById('intro-video');
        const mainLobby = document.getElementById('main-lobby');

        // ★ 함수 안에서 오디오 요소를 다시 찾습니다.
        const introBgm = document.getElementById('intro-bgm');

        if (!introOverlay) return;

        // ★ 소리 재생 명령
        if (introBgm) {
          introBgm.muted = false; // 혹시 모르니 무음 해제
          introBgm
            .play()
            .then(() => console.log('음악 재생 성공!'))
            .catch((e) => {
              console.error('재생 실패 원인:', e);
              alert('소리 재생에 실패했습니다. 파일 경로를 확인해주세요.');
            });
        }

        // 인트로 숨기기 로직
        introOverlay.style.opacity = '0';
        setTimeout(() => {
          introOverlay.style.display = 'none';
          if (mainLobby) mainLobby.style.display = 'flex';
          if (introVideo) introVideo.pause();
        }, 800);
      }
    </script>
    <audio id="intro-bgm" src="intro_music.mp3" loop></audio>
    <audio id="timer-sound" src="timer_tick.mp3" loop></audio>
    <audio id="correct-sound" src="correct.mp3"></audio>
    <audio id="wrong-sound" src="wrong.mp3"></audio>
  </body>
</html>
