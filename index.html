<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 스피킹게임</title>
    <meta property="og:title" content="진담중국어 - 스피킹게임" />
    <meta
      property="og:description"
      content="입주민을 위한 프리미엄 중국어 복습 게임"
    />
    <meta property="og:image" content="image.png" />
    <meta
      property="og:url"
      content="https://jindam1799.github.io/granhills_jindam/"
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="진담중국어 - 스피킹게임" />
    <meta
      name="twitter:description"
      content="입주민을 위한 프리미엄 중국어 복습 게임"
    />
    <meta name="twitter:image" content="image.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="intro-overlay" onclick="startLobby()">
      <video id="intro-video" autoplay muted playsinline loop>
        <source src="intro.mp4" type="video/mp4" />
        영상을 재생할 수 없습니다.
      </video>
    </div>
    <div class="lobby-container">
      <div class="lobby-header">
        <span class="apt-tag">JINDAM CHINESE</span>
        <h1>진담중국어 <span>로비</span></h1>
        <p>학습할 레벨을 선택해 주세요!</p>
      </div>

      <!-- 🌟 레벨 선택 대형 버튼 영역 -->
      <div class="level-select-container">
        <button class="level-btn" onclick="toggleLevel('level1-content')">
          🌟 Level 1 시작하기
        </button>

        <!-- 🚀 Level 2 버튼 잠금 해제 및 토글 함수 연결 -->
        <button class="level-btn" onclick="toggleLevel('level2-content')">
          🚀 Level 2 시작하기
        </button>
      </div>

      <!-- 🌟 Level 1 클릭 시 나타날 상세 영역 (초기 상태: display:none) -->
      <div id="level1-content" class="level-content" style="display: none">
        <div class="level-section">
          <h2>🌟 진담중국어 Level 1 🌟</h2>

          <!-- Step 1: 단어 스피드 게임 -->
          <div class="game-type-box">
            <h3>📖 Step 1: 단어 스피드 게임</h3>
            <div class="button-grid">
              <button onclick="location.href = 'day1_word.html'">단어 1</button>
              <button onclick="location.href = 'day2_word.html'">단어 2</button>
              <button onclick="location.href = 'day3_word.html'">단어 3</button>
              <button onclick="location.href = 'day4_word.html'">단어 4</button>
              <button onclick="location.href = 'day5_word.html'">단어 5</button>
              <button onclick="location.href = 'day6_word.html'">단어 6</button>
              <button onclick="location.href = 'day7_word.html'">단어 7</button>
              <button onclick="location.href = 'day8_word.html'">단어 8</button>
            </div>
          </div>

          <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0" />

          <!-- Step 2: 문장 덩어리 게임 -->
          <div class="game-type-box">
            <h3>🗣️ Step 2: 문장 덩어리 게임</h3>
            <div class="button-grid">
              <button onclick="location.href = 'day1_choice.html'">
                문장 1
              </button>
              <button onclick="location.href = 'day2_choice.html'">
                문장 2
              </button>
              <button onclick="location.href = 'day3_choice.html'">
                문장 3
              </button>
              <button onclick="location.href = 'day4_choice.html'">
                문장 4
              </button>
              <button onclick="location.href = 'day5_choice.html'">
                문장 5
              </button>
              <button onclick="location.href = 'day6_choice.html'">
                문장 6
              </button>
              <button onclick="location.href = 'day7_choice.html'">
                문장 7
              </button>
              <button onclick="location.href = 'day8_choice.html'">
                문장 8
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Level 1 끝 -->

      <!-- 🌟 Level 2가 lobby-container 안쪽으로 들어왔습니다! -->
      <div id="level2-content" class="level-content" style="display: none">
        <div class="level-section">
          <h2>🚀 진담중국어 Level 2 (실전 문장) 🚀</h2>

          <div class="game-type-box">
            <h3>🗣️ 실전 문장 덩어리 게임</h3>
            <div class="button-grid">
              <!-- 👇 이렇게 하나로 통일하고 물음표(?) 뒤에 숫자만 바꿔주세요 👇 -->
              <button onclick="location.href = 'game.html?day=9'">
                덩어리 1
              </button>
              <button onclick="location.href = 'game.html?day=10'">
                덩어리 2
              </button>
              <button onclick="location.href = 'game.html?day=11'">
                덩어리 3
              </button>
              <button onclick="location.href = 'game.html?day=12'">
                덩어리 4
              </button>

              <button onclick="location.href = 'game.html?day=13'">
                덩어리 5
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 🌟 여기가 lobby-container의 진짜 끝입니다 -->

    <script src="index_script.js"></script>

    <audio id="intro-bgm" src="intro_music.mp3" loop></audio>
    <!-- 변경 후 (이렇게 덮어써주세요!) -->
    <audio id="timer-sound" src="timer_tick.mp3" loop preload="none"></audio>
    <audio id="correct-sound" src="correct.mp3" preload="none"></audio>
    <audio id="wrong-sound" src="wrong.mp3" preload="none"></audio>
  </body>
</html>
