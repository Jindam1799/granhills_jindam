<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 - 덩어리게임</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* [프리미엄 오렌지 테마 보강 스타일] */
      .sentence-display {
        min-height: 120px;
        background: #fffaf7;
        border-radius: 24px;
        margin-bottom: 25px;
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 15px;
        border: 3px dashed var(--primary-light);
        width: 100%;
        box-sizing: border-box;
      }

      /* ★ 테이블 위 카드: 흰색 글자 제거, 오렌지 테마 적용 ★ */
      .selected-card {
        background: var(--primary-light) !important; /* 연한 주황 배경 */
        border: 3px solid var(--primary) !important; /* 진한 주황 테두리 */
        padding: 15px 25px !important;
        border-radius: 15px;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        text-align: center;
        box-shadow: 0 4px 10px rgba(255, 120, 0, 0.1);
        min-width: 100px;
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* 선택된 카드 내부 글자색: 메인 테마색(#ff7800) 적용 */
      .selected-card .hz-text {
        font-size: 2.5rem !important;
        font-weight: 900;
        line-height: 1.1;
        color: var(--primary) !important; /* 주황색 글자 */
      }
      .selected-card .py-text {
        font-size: 1.1rem !important;
        font-weight: 700;
        margin-top: 5px;
        color: var(--primary) !important; /* 주황색 글자 */
      }

      /* 아래쪽 대기 카드 - Hover 시에도 테마 유지 */
      .chunk-pool {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        width: 100%;
      }
      .chunk-card {
        padding: 18px 25px !important;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 100px;
        border: 3px solid #f0f0f0 !important;
        background: #ffffff;
        transition: 0.2s;
      }

      /* ★ Hover(마우스/터치) 시 글자색을 주황색으로 ★ */
      .chunk-card:hover {
        border-color: var(--primary) !important;
        background: var(--primary-light) !important;
      }
      .chunk-card:hover .cn-text,
      .chunk-card:hover .pinyin-text {
        color: var(--primary) !important;
      }

      .chunk-card.used {
        opacity: 0.1;
        pointer-events: none;
      }
      .chunk-card .cn-text {
        font-size: 2rem !important;
        font-weight: 900;
        color: var(--text-main);
      }
      .chunk-card .pinyin-text {
        font-size: 1.1rem !important;
        font-weight: 600;
        color: #888;
      }

      @keyframes popIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      #reset-btn {
        margin-top: 20px;
        background: none;
        border: none;
        color: #ccc;
        text-decoration: underline;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="apt-tag">GRAN HILLS GROUP STUDY</div>
      <button class="back-btn" onclick="location.href = 'index.html'">
        ◀ 로비로
      </button>
      <div id="start-screen" class="question-box">
        <div
          class="apt-tag"
          style="
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
          "
        >
          STEP 2
        </div>
        <h2 style="font-size: 2.2rem; margin-top: 10px">문장 완성 게임</h2>

        <p
          class="intro-text"
          style="font-size: 1.2rem; line-height: 1.6; color: #555"
        >
          카드를 순서대로 눌러서<br />중국어 문장을 완성하세요!
        </p>

        <div
          class="voice-instruction"
          style="line-height: 1.5; margin-top: 15px"
        >
          "한국어를 보고 말이 바로 나올 수 있도록 <br />
          <span style="color: var(--primary); font-weight: bold"
            >반드시 소리를 내어</span
          >
          크게 읽어주세요!"
        </div>

        <button id="start-btn" onclick="startGame()" style="margin-top: 25px">
          ⚡ 시작하기
        </button>
      </div>

      <div id="game-board" style="display: none">
        <div class="header">
          <div class="status-badge">🕒 <span id="timer">20</span>초</div>
          <div class="status-badge">✅ <span id="score">0</span> / 20</div>
        </div>

        <div class="question-box">
          <div
            id="ko-sentence"
            style="font-size: 1.8rem; font-weight: 900; color: var(--primary)"
          >
            질문을 불러오는 중...
          </div>
        </div>

        <div class="sentence-display" id="sentence-display"></div>
        <div
          id="feedback-msg"
          style="
            text-align: center;
            height: 32px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.4rem;
          "
        ></div>
        <div class="chunk-pool" id="chunk-pool"></div>

        <button id="reset-btn" onclick="resetCurrentSentence()">
          다시 선택하기
        </button>
      </div>

      <div id="result-screen">
        <div class="result-content">
          <div class="apt-tag">마스터 완료</div>
          <h2>🎉 축하합니다!</h2>
          <p
            id="final-score"
            style="
              font-size: 1.5rem;
              line-height: 1.6;
              margin: 20px 0;
              color: #555;
            "
          ></p>
          <button class="home-btn" onclick="location.href = 'index.html'">
            🏠 로비로 돌아가기
          </button>
        </div>
      </div>
    </div>
    <script src="day1_choice_script.js"></script>
    <audio id="timer-sound" src="timer_tick.mp3" loop></audio>
    <audio id="correct-sound" src="correct.mp3"></audio>
    <audio id="wrong-sound" src="wrong.mp3"></audio>
  </body>
</html>
