<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진담중국어 - 덩어리게임</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* [프리미엄 오렌지 테마 보강 스타일] */
      .sentence-display {
        min-height: 120px;
        background: #fffaf7;
        border-radius: 24px;
        margin-bottom: 25px;
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 15px;
        border: 3px dashed var(--primary-light);
        width: 100%;
        box-sizing: border-box;
      }

      /* ★ 테이블 위 카드 ★ */
      .selected-card {
        background: var(--primary-light) !important;
        border: 3px solid var(--primary) !important;
        padding: 15px 25px !important;
        border-radius: 15px;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        text-align: center;
        box-shadow: 0 4px 10px rgba(255, 120, 0, 0.1);
        min-width: 100px;
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .selected-card .hz-text {
        font-size: 2.5rem !important;
        font-weight: 900;
        line-height: 1.1;
        color: var(--primary) !important;
      }
      .selected-card .py-text {
        font-size: 1.1rem !important;
        font-weight: 700;
        margin-top: 5px;
        color: var(--primary) !important;
      }

      /* 아래쪽 대기 카드 풀 */
      .chunk-pool {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        width: 100%;
      }

      /* ★ [모바일 잔상 완벽 제거 핵심 CSS] ★ */
      .chunk-card {
        padding: 18px 25px !important;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 100px;
        border: 3px solid #f0f0f0 !important;
        background: #ffffff;
        transition: none !important; /* 애니메이션 삭제 */
        -webkit-tap-highlight-color: transparent !important; /* 파란 박스 제거 */
        outline: none !important;
      }

      /* PC 마우스에서만 주황색 호버 효과 (모바일 터치는 무시) */
      @media (hover: hover) {
        .chunk-card:hover {
          border-color: var(--primary) !important;
          background: var(--primary-light) !important;
        }
      }

      /* 모바일에서 터치한 후 주황색으로 고정되는 현상 원천 차단 */
      .chunk-card:focus,
      .chunk-card:active {
        background-color: white !important;
        border-color: #f0f0f0 !important;
      }

      .chunk-card.used {
        opacity: 0.1;
        pointer-events: none;
      }
      .chunk-card .cn-text {
        font-size: 2rem !important;
        font-weight: 900;
        color: var(--text-main);
      }
      .chunk-card .pinyin-text {
        font-size: 1.1rem !important;
        font-weight: 600;
        color: #888;
      }

      @keyframes popIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      #reset-btn {
        margin-top: 20px;
        background: none;
        border: none;
        color: #ccc;
        text-decoration: underline;
        font-size: 1rem;
        cursor: pointer;
      }

      /* ==================================================
   [TTS 팝업창 스타일]
   ================================================== */
      .tts-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .tts-popup-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .tts-popup-box {
        background: #ffffff;
        border-radius: 24px;
        padding: 40px 20px;
        text-align: center;
        width: 85%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transform: translateY(20px);
        transition: transform 0.3s ease;
        border: 4px solid var(--primary);
      }

      .tts-popup-overlay.active .tts-popup-box {
        transform: translateY(0);
      }

      .tts-popup-cn {
        font-size: 3.5rem;
        font-weight: 900;
        color: var(--primary);
        line-height: 1.2;
        margin-bottom: 5px; /* 병음과 가까이 붙게 마진을 줄입니다 */
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
      }
      /* 기존 .tts-popup-py 수정 (초기 상태 숨김) */
      .tts-popup-py {
        font-size: 1.5rem;
        color: #666;
        margin-bottom: 25px;
        font-family: Arial, sans-serif;
        letter-spacing: 1px;
        display: none; /* 👈 초기에는 병음이 보이지 않도록 숨깁니다 */
        animation: fadeIn 0.3s ease; /* 부드럽게 나타나는 효과 */
      }

      /* 👇 새롭게 추가할 병음 버튼 스타일 👇 */
      .py-toggle-btn {
        background-color: #f4f4f4;
        color: #555;
        border: 1px solid #ddd;
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-bottom: 15px;
        transition: all 0.2s ease;
      }

      .py-toggle-btn:hover,
      .py-toggle-btn:active {
        background-color: #e0e0e0;
      }

      /* 부드럽게 나타나는 애니메이션 */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tts-popup-btn-group {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      .tts-btn {
        padding: 15px 20px;
        font-size: 1.2rem;
        border-radius: 15px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .tts-btn-listen {
        background: #ffe0b2;
        color: #e65100;
      }

      .tts-btn-next {
        background: var(--primary);
        color: white;
      }
      /* 안드로이드 크롬 전용: 비디오 및 비동기 오디오의 기본 미디어 재생 팝업 강제 파괴 */
      video::-webkit-media-controls-start-playback-button,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-play-button {
        display: none !important;
        -webkit-appearance: none !important;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div class="apt-tag">GRAN HILLS GROUP STUDY</div>
      <button class="back-btn" onclick="location.href = 'index.html'">
        ◀ 로비로
      </button>
      <div id="start-screen" class="question-box">
        <div
          class="apt-tag"
          style="
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
          "
        >
          STEP 2
        </div>
        <h2 style="font-size: 2.2rem; margin-top: 10px">문장 완성 게임</h2>

        <p
          class="intro-text"
          style="font-size: 1.2rem; line-height: 1.6; color: #555"
        >
          카드를 순서대로 눌러서<br />중국어 문장을 완성하세요!
        </p>

        <div
          class="voice-instruction"
          style="line-height: 1.5; margin-top: 15px"
        >
          "한국어를 보고 말이 바로 나올 수 있도록 <br />
          <span style="color: var(--primary); font-weight: bold"
            >반드시 소리를 내어</span
          >
          크게 읽어주세요!"
        </div>

        <button id="start-btn" onclick="startGame()" style="margin-top: 25px">
          ⚡ 시작하기
        </button>
      </div>

      <div id="game-board" style="display: none">
        <div class="header">
          <div class="status-badge">🕒 <span id="timer">20</span>초</div>
          <div class="status-badge">✅ <span id="score">0</span> / 20</div>
        </div>

        <div class="question-box">
          <div
            id="ko-sentence"
            style="font-size: 1.8rem; font-weight: 900; color: var(--primary)"
          >
            질문을 불러오는 중...
          </div>
        </div>

        <div class="sentence-display" id="sentence-display"></div>
        <div
          id="feedback-msg"
          style="
            text-align: center;
            height: 32px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.4rem;
          "
        ></div>
        <div class="chunk-pool" id="chunk-pool"></div>

        <button id="reset-btn" onclick="resetCurrentSentence()">
          다시 선택하기
        </button>
      </div>

      <div id="result-screen">
        <div class="result-content">
          <div class="apt-tag">마스터 완료</div>
          <h2>🎉 9주차 완성~ 축하합니다!</h2>
          <p
            id="final-score"
            style="
              font-size: 1.5rem;
              line-height: 1.6;
              margin: 20px 0;
              color: #555;
            "
          ></p>
          <button class="home-btn" onclick="location.href = 'index.html'">
            🏠 로비로 돌아가기
          </button>
        </div>
      </div>
    </div>

    <script src="game_script.js"></script>
    <!-- 변경 후 (이렇게 덮어써주세요!) -->
    <audio id="timer-sound" src="timer_tick.mp3" loop preload="none"></audio>
    <audio id="correct-sound" src="correct.mp3" preload="none"></audio>
    <audio id="wrong-sound" src="wrong.mp3" preload="none"></audio>
  </body>
</html>
